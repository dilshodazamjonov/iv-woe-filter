name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Environment variables applied to all jobs
env:
  # Opt into Node.js 24 to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Testing across all standard Python versions
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          # Explicitly use --system to avoid venv errors on the GitHub runner
          uv pip install --system -e ".[test]"
          uv pip install --system ruff

      - name: Lint with Ruff
        run: |
          # Use python -m to ensure we use the version from the matrix
          python -m ruff check .

      - name: Run Tests
        run: |
          # Running pytest from the root; matches your pyproject.toml config
          python -m pytest tests/

  build:
    name: Build Distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      
      - name: Build package
        run: |
          # Verifies that the package can be bundled for distribution
          uv build